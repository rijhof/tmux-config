# ===========================================
# Keybindings
# ===========================================

# Reload config with prefix + r
unbind r
bind r source-file ~/.tmux.conf

# ===========================================
# General Settings
# ===========================================

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ===========================================
# Statusbar
# ===========================================

# Position statusbar at the top
set -g status-position top

# Catppuccin Mocha color palette
# Base:     #1e1e2e  Mantle:   #181825  Crust:    #11111b
# Surface:  #313244  #45475a  #585b70
# Overlay:  #6c7086  #7f849c  #9399b2
# Text:     #cdd6f4  Subtext:  #bac2de  #a6adc8
# Lavender: #b4befe  Blue:     #89b4fa  Sapphire: #74c7ec
# Sky:      #89dceb  Teal:     #94e2d5  Green:    #a6e3a1
# Yellow:   #f9e2af  Peach:    #fab387  Maroon:   #eba0ac
# Red:      #f38ba8  Mauve:    #cba6f7  Pink:     #f5c2e7

# Statusbar style (Catppuccin dark background)
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left side: session name with mauve accent
set -g status-left '#[bg=#cba6f7,fg=#1e1e2e,bold] 💻 #S #[bg=#1e1e2e] '
set -g status-left-length 30

# Right side: path, date and time with Catppuccin accents
set -g status-right '#[bg=#313244,fg=#94e2d5] 📁 #{=30:pane_current_path} #[bg=#1e1e2e]#[fg=#6c7086] 📅 %d.%m.%y #[fg=#89b4fa,bold] 🕐 %H:%M '
set -g status-right-length 90

# Window list styling with emoji numbers
set -g window-status-format '#[fg=#6c7086] #(~/.tmux/scripts/emoji_num.sh #I) #W '
set -g window-status-current-format '#[bg=#313244,fg=#89dceb,bold] #(~/.tmux/scripts/emoji_num.sh #I) #W '

# Left-align window list
set -g status-justify left

# Separator between windows
set -g window-status-separator ''

# ===========================================
# Pane Borders (Modern thick style)
# ===========================================

# Thick/heavy border lines (tmux 3.2+)
set -g pane-border-lines heavy

# Border colors (Catppuccin)
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

# Show pane indicators (arrows/colours)
set -g pane-border-indicators colour

# ===========================================
# Popup & Message Styling
# ===========================================

# Message/command prompt styling
set -g message-style 'bg=#cba6f7 fg=#1e1e2e bold'
set -g message-command-style 'bg=#313244 fg=#cdd6f4'

# Mode styling (copy mode, etc.)
set -g mode-style 'bg=#89b4fa fg=#1e1e2e bold'

# Popup styling (tmux 3.2+)
set -g popup-border-style 'fg=#cba6f7'
set -g popup-border-lines heavy

# ===========================================
# Clock & Display
# ===========================================

# Clock mode color (Catppuccin mauve)
set -g clock-mode-colour '#cba6f7'
set -g clock-mode-style 24

# ===========================================
# Two Status Lines
# ===========================================

set -g status 2
set-option -g status-interval 2

# Line 1 (top): System Info with capsules
set -g status-format[0] "#[bg=#1e1e2e]#[fg=#fab387]#[bg=#fab387,fg=#1e1e2e,bold] 🎯 #(~/.tmux/scripts/mode.sh) #[fg=#fab387,bg=#1e1e2e] #[fg=#313244]#[bg=#313244,fg=#89dceb] 📊 #(~/.tmux/scripts/cpu.sh) #[fg=#313244,bg=#1e1e2e] #[fg=#45475a]#[bg=#45475a,fg=#89b4fa] 🗄️  #(~/.tmux/scripts/ram.sh) #[fg=#45475a,bg=#1e1e2e] #[fg=#313244]#[bg=#313244,fg=#a6e3a1] 💾 #(df -h / | awk 'NR==2 {print $5}') #[fg=#313244,bg=#1e1e2e]#[align=right]#[fg=#6c7086]#[bg=#6c7086,fg=#cdd6f4] 🖥️  #(~/.tmux/scripts/totalmem.sh) #[fg=#6c7086,bg=#1e1e2e]"

# Line 2 (bottom): Path + Session + Windows + Time with capsules
set -g status-format[1] "#[bg=#1e1e2e]#[fg=#313244]#[bg=#313244,fg=#94e2d5] 📁 #{=30:pane_current_path} #[fg=#313244,bg=#1e1e2e] #[fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e,bold] 💻 #S #[fg=#cba6f7,bg=#1e1e2e] #(~/.tmux/scripts/window_list.sh)#[align=right]#[fg=#6c7086]#[bg=#6c7086,fg=#cdd6f4] 📅 %d.%m.%y #[fg=#6c7086,bg=#1e1e2e] #[fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e,bold] 🕐 %H:%M #[fg=#89b4fa,bg=#1e1e2e]"

# ===========================================
# Plugins (TPM)
# ===========================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'ofirgall/tmux-browser'

# Session-x settings
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'

# tmux-browser settings
set -g @browser_session_dir '$HOME/.tmux/browser-sessions'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
